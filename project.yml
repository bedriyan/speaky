name: Speakink
options:
  bundleIdPrefix: com.bedriyan
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  configs:
    Release:
      ONLY_ACTIVE_ARCH: false

packages:
  SwiftWhisper:
    url: https://github.com/exPHAT/SwiftWhisper
    from: 1.2.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 1.9.0
  DynamicNotchKit:
    url: https://github.com/MrKai77/DynamicNotchKit
    from: 1.0.0
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    branch: main

targets:
  Speakink:
    type: application
    platform: macOS
    sources:
      - Speakink
    settings:
      configs:
        Debug:
          ONLY_ACTIVE_ARCH: true
        Release:
          ONLY_ACTIVE_ARCH: false
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bedriyan.speakink
        PRODUCT_NAME: Speakink
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ARCHS: "arm64 x86_64"
        CODE_SIGN_ENTITLEMENTS: Speakink/Resources/Speakink.entitlements
        INFOPLIST_FILE: Speakink/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        OTHER_SWIFT_FLAGS: ""
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    dependencies:
      - package: SwiftWhisper
      - package: KeyboardShortcuts
      - package: DynamicNotchKit
      - package: FluidAudio
      - sdk: CoreAudio.framework
      - sdk: AudioToolbox.framework
      - sdk: Security.framework
      - sdk: Carbon.framework

    entitlements:
      path: Speakink/Resources/Speakink.entitlements
      properties:
        com.apple.security.device.audio-input: true
